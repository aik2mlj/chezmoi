[[mgr.prepend_keymap]]
on = ["<C-n>"]
run = '''
	shell 'dragon-drop -a -x "$@"'
'''

[[mgr.prepend_keymap]]
on = "l"
run = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

[[mgr.prepend_keymap]]
on   = [ "c", "a", "a" ]
run  = "plugin compress"
desc = "Archive selected files"

[[mgr.prepend_keymap]]
on   = [ "c", "a", "p" ]
run  = "plugin compress -p"
desc = "Archive selected files (password)"

[[mgr.prepend_keymap]]
on   = [ "c", "a", "h" ]
run  = "plugin compress -ph"
desc = "Archive selected files (password+header)"

[[mgr.prepend_keymap]]
on   = [ "c", "a", "l" ]
run  = "plugin compress -l"
desc = "Archive selected files (compression level)"

[[mgr.prepend_keymap]]
on   = [ "c", "a", "u" ]
run  = "plugin compress -phl"
desc = "Archive selected files (password+header+level)"

[[mgr.prepend_keymap]]
on = ["R"]
run = '''
    shell "$@" --block
'''
desc = "Execute the scripts"

[[mgr.prepend_keymap]]
on = ["J"]
run = "arrow 5"

[[mgr.prepend_keymap]]
on = ["K"]
run = "arrow -5"

[[mgr.prepend_keymap]]
on = ["<A-j>"]
run = "seek 5"

[[mgr.prepend_keymap]]
on = ["<A-k>"]
run = "seek -5"

[[input.prepend_keymap]]
on = ["<Esc>"]
run = "close"
desc = "Cancel input"

[[mgr.prepend_keymap]]
on = "!"
run = 'shell "$SHELL" --block'
desc = "Open shell here"

[[mgr.prepend_keymap]]
on = "<F9>"
run = "plugin mediainfo -- toggle-metadata"
desc = "Toggle media preview metadata"
