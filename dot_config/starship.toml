## FIRST LINE/ROW: Info & Status
# First param ÔöÇÔöî
"$schema" = 'https://starship.rs/config-schema.json'

[username]
format = " [Ôò¡ÔöÇ$user]($style) "
show_always = true
style_root = "bold red"
style_user = "bold red"

# Second param
[hostname]
disabled = false
format = "on [$hostname]($style) in "
ssh_only = true
ssh_symbol = "¯¼ü "
style = "bold dimmed red"
trim_at = "-"

# Third param
[directory]
style = "bold cyan"
truncate_to_repo = true
truncation_length = 0
truncation_symbol = "Õå½"
read_only = " ¾░î¥"

# Fourth param
[sudo]
disabled = false

# Before all the version info (python, nodejs, php, etc.)
[git_status]
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
deleted = "x"
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
style = "white"

# Last param in the first line/row
[cmd_duration]
disabled = false
format = "took [$duration]($style)"
min_time = 1


## SECOND LINE/ROW: Prompt
# Somethere at the beginning

# Prompt: optional param 1
[time]
disabled = true
format = " ­şòÖ $time($style)\n"
style = "bright-white"
time_format = "%T"

[shell]
fish_indicator = "¾░ê║"
powershell_indicator = "´æá_"
xonsh_indicator = "¯İå"
bash_indicator = "Ï¿"
format = " [Ôò░ÔöÇ$indicator]($style) "
unknown_indicator = "*"
style = "bold blue"
disabled = false

# Prompt: param 2
[character]
error_symbol = "[├ù](bold red)"
success_symbol = "(bold red)"

[battery]
disabled = true

